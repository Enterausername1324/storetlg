<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <header class="sys-header">
        <div class="sys-logo">TIMELOOP.OS</div>
        <nav class="sys-nav">
            <a href="index.html" class="nav-link">Entry</a>
            <a href="store.html" class="nav-link active">Active_Directory</a>

    <main class="os-container store-view">

                <div class="pkg-footer">
                    <span class="pkg-price">$19.99</span>
                    <button class="sys-btn">Purchase_License</button>
                </div>

        </div>
